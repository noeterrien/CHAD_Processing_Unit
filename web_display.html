<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Get DX Status</title>
</head>
<body>
    <h1>DX Value:</h1>
    <p id="dxValue">Loading...</p>

    <button onclick="getDX()">Get DX</button>
<p id="dxValue"></p>

<script>
function getDX() {
    fetch('http://localhost:8000/status/dx')
        .then(res => res.text())
        .then(data => {
            document.getElementById('dxValue').textContent = data;
        })
        .catch(err => console.error(err));
}
</script>
</body>
</html>
